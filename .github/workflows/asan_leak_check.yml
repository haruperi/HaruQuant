name: ASan Leak Check

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  asan:
    runs-on: ubuntu-latest
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
      LSAN_OPTIONS: detect_leaks=1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config curl zip unzip tar autoconf automake libtool

      - name: Install nanobind
        run: python -m pip install --upgrade pip nanobind

      - name: Bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git "${VCPKG_ROOT}"
          "${VCPKG_ROOT}/bootstrap-vcpkg.sh" -disableMetrics

      - name: Install C++ dependencies with vcpkg
        run: |
          "${VCPKG_ROOT}/vcpkg" install spdlog gtest cppzmq benchmark tomlplusplus

      - name: Configure (ASan ON)
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" \
            -DHQT_BUILD_BENCHMARKS=OFF \
            -DHQT_ENABLE_ASAN=ON

      - name: Build core tests and bridge
        run: |
          cmake --build build --parallel --target hqt_tests hqt_engine

      - name: Run C++ tests (ASan)
        run: ctest --test-dir build --output-on-failure

      - name: Run bridge lifecycle ASan check
        env:
          PYTHONPATH: ${{ github.workspace }}/build/bridge:${{ github.workspace }}/build/bridge/Release
        run: python tests/contracts/asan_bridge_lifecycle_check.py
