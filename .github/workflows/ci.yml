name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Backend formatting smoke check
        run: |
          python -m black --check apps/core apps/api/main.py tests/unit/apps/core/test_settings.py tests/unit/apps/api/test_main_route_mounts.py
          python -m isort --check-only apps/core tests/unit/apps/core/test_settings.py
          python -m flake8 apps/core/settings.py
      - name: Backend type smoke check
        run: python -m mypy apps/core/settings.py
      - name: Backend pre-commit smoke check
        run: >
          python -m pre_commit run
          --files
          pyproject.toml
          .pre-commit-config.yaml
          apps/core/settings.py
          tests/unit/apps/core/test_settings.py
      - name: Backend unit smoke tests
        run: >
          python -m pytest
          --override-ini addopts=
          --basetemp .tmp_pytest_ci
          tests/unit/apps/core/test_settings.py
          tests/unit/apps/api/test_main_route_mounts.py
          -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json
      - name: Install frontend dependencies
        run: npm ci --prefix ui
      - name: Frontend lint
        run: npm run lint --prefix ui
