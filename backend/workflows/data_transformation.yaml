name: data_transformation
version: 0.1.0
pattern: sequential
description: >
  Prepare model-ready trading data through acquisition, validation,
  preprocessing, feature engineering, exploratory diagnostics, and evidence
  assembly.
steps:
  - name: acquire_market_data
    agent: research_agent
    expected_output: ObservationEvent
    validate: true
    input:
      stage: acquire_market_data
      mode: research

  - name: validate_market_data
    agent: compliance_agent
    expected_output: EvaluationReport
    validate: true
    depends_on:
      - acquire_market_data
    input:
      stage: validate_market_data

  - name: preprocess_and_transform
    agent: research_agent
    expected_output: ObservationEvent
    validate: true
    depends_on:
      - validate_market_data
    input:
      stage: preprocess_and_transform

  - name: build_features_and_eda
    agent: research_agent
    expected_output: EvaluationReport
    validate: true
    depends_on:
      - preprocess_and_transform
    input:
      stage: build_features_and_eda

  - name: assemble_evidence
    agent: monitoring_agent
    expected_output: ReplayBundle
    validate: true
    depends_on:
      - build_features_and_eda
    input:
      stage: assemble_evidence
