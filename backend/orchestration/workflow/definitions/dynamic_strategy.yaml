name: dynamic_strategy
version: 0.1.0
pattern: sequential
description: >
  Evaluate and backtest a dynamic allocation strategy with walk-forward
  validation, risk analytics, transaction costs, evidence, and promotion
  readiness review.
steps:
  - name: build_strategy_hypothesis
    agent: strategy_agent
    expected_output: TradeHypothesis
    validate: true
    input:
      stage: build_strategy_hypothesis
      mode: research

  - name: run_walk_forward_backtest
    agent: portfolio_agent
    expected_output: EvaluationReport
    validate: true
    depends_on:
      - build_strategy_hypothesis
    input:
      stage: run_walk_forward_backtest

  - name: assess_strategy_risk
    agent: risk_governor_agent
    expected_output: RiskAssessmentDecision
    validate: true
    depends_on:
      - run_walk_forward_backtest
    input:
      stage: assess_strategy_risk
      side_effects_allowed: false

  - name: build_strategy_card
    agent: monitoring_agent
    expected_output: EvaluationReport
    validate: true
    depends_on:
      - assess_strategy_risk
    input:
      stage: build_strategy_card

  - name: assemble_evidence
    agent: monitoring_agent
    expected_output: ReplayBundle
    validate: true
    depends_on:
      - build_strategy_card
    input:
      stage: assemble_evidence
