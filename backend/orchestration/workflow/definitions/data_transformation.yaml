name: data_transformation
version: 0.2.0
pattern: sequential
description: >
  AI trading workflow with refinement. Turns raw market data into
  model-ready features, strategy signals, backtest evidence, evaluation
  metrics, multi-configuration refinement experiments, and agent-driven
  conclusions about strategy viability.
steps:
  - name: collect_market_data
    agent: research_agent
    expected_output: ObservationEvent
    validate: true
    input:
      workflow_step: 1
      stage: collect_market_data
      mode: research
      sources:
        - ohlcv
        - tick
        - fundamentals
        - macro
        - sentiment

  - name: clean_and_prepare_data
    agent: compliance_agent
    expected_output: EvaluationReport
    validate: true
    depends_on:
      - collect_market_data
    input:
      workflow_step: 2
      stage: clean_and_prepare_data
      checks:
        - sort_by_time
        - remove_duplicate_timestamps
        - validate_ohlcv_types
        - handle_missing_values
        - normalize_timezone
        - resample_if_needed

  - name: create_features
    agent: research_agent
    expected_output: ObservationEvent
    validate: true
    depends_on:
      - clean_and_prepare_data
    input:
      workflow_step: 3
      stage: create_features
      feature_sets:
        - returns
        - log_returns
        - rolling_mean
        - rolling_volatility
        - rsi
        - moving_averages
        - momentum
        - regime_labels

  - name: define_strategy_or_model
    agent: strategy_agent
    expected_output: TradeHypothesis
    validate: true
    depends_on:
      - create_features
    input:
      workflow_step: 4
      stage: define_strategy_or_model
      baseline:
        strategy: rsi
        oversold: 30
        overbought: 70
      later_extensions:
        - supervised_direction_model
        - unsupervised_regime_filter
        - reinforcement_learning_policy

  - name: generate_signals
    agent: strategy_agent
    expected_output: TradeProposal
    validate: true
    depends_on:
      - define_strategy_or_model
    input:
      workflow_step: 5
      stage: generate_signals
      output_contract: SignalIntent
      safeguards:
        - no_lookahead_bias
        - timestamp_aligned_features
        - explicit_position_state

  - name: run_unsupervised_research
    agent: research_agent
    expected_output: EvaluationReport
    validate: true
    depends_on:
      - generate_signals
    input:
      workflow_step: 6
      stage: run_unsupervised_research
      lesson: unsupervised_learning
      methods:
        - investment_data_summary
        - pca_risk_factor_analysis
        - kmeans_regime_clustering
        - cluster_outperformance
        - cluster_signal_adaptation
      parameters:
        n_components: 2
        n_clusters: 3
        random_state: 42
        forward_return_horizon: 1
      safeguards:
        - standardize_features
        - no_forward_returns_in_features
        - no_raw_price_clustering
        - adapted_signals_remain_shifted_before_backtest
      outputs:
        - unsupervised_data_summary
        - pca_metadata
        - kmeans_cluster_metadata
        - pca_risk_factors
        - cluster_outperformance
        - cluster_signal_adaptation

  - name: backtest_strategy
    agent: research_agent
    expected_output: EvaluationReport
    validate: true
    depends_on:
      - run_unsupervised_research
    input:
      workflow_step: 7
      stage: backtest_strategy
      simulation:
        capital: 100000
        transaction_cost: 0.0005
        slippage_model: fixed_bps
        position_lag: 1
      outputs:
        - strategy_returns
        - buy_hold_equity
        - strategy_equity
        - trade_count

  - name: evaluate_performance
    agent: research_agent
    expected_output: EvaluationReport
    validate: true
    depends_on:
      - backtest_strategy
    input:
      workflow_step: 8
      stage: evaluate_performance
      metrics:
        - cumulative_return
        - buy_hold_return
        - annualized_return
        - annualized_volatility
        - sharpe_ratio
        - max_drawdown
        - win_rate
        - profit_factor

  - name: refine_and_repeat
    agent: monitoring_agent
    expected_output: ReplayBundle
    validate: true
    depends_on:
      - evaluate_performance
    input:
      workflow_step: 9
      stage: refine_and_repeat
      refinement_options:
        - adjust_rsi_thresholds
        - add_moving_average_filter
        - improve_feature_set
        - improve_validation_split
        - stress_cost_assumptions
      evidence:
        - data_hash
        - feature_manifest
        - signal_manifest
        - backtest_metrics
        - replay_bundle

  - name: run_refinement_experiments
    agent: research_agent
    expected_output: EvaluationReport
    validate: true
    depends_on:
      - refine_and_repeat
    input:
      workflow_step: 10
      stage: run_refinement_experiments
      experiments:
        - name: tighter_rsi_thresholds
          description: Change RSI thresholds from 30/70 to 20/80
          params:
            oversold: 20
            overbought: 80
        - name: ma_trend_filter
          description: Add SMA(50) trend filter to RSI signals
          params:
            ma_period: 50
            use_ma_filter: true
        - name: cross_symbol_test
          description: Test RSI baseline on GBPUSD
          params:
            symbol: GBPUSD
        - name: cross_timeframe_test
          description: Test RSI baseline on D1 timeframe
          params:
            timeframe: D1
      comparisons:
        - rsi_30_70_vs_20_80
        - with_vs_without_ma_filter
        - strategy_vs_buy_and_hold
        - cross_symbol_robustness
        - cross_timeframe_robustness

  - name: agent_evaluate_and_conclude
    agent: refine_agent
    expected_output: RefinementReport
    validate: true
    depends_on:
      - run_refinement_experiments
    input:
      workflow_step: 11
      stage: agent_evaluate_and_conclude
      evaluation_criteria:
        - threshold_comparison
        - ma_filter_impact
        - strategy_vs_buy_and_hold
        - cross_market_robustness
        - overall_viability
      output_contract: RefinementReport
      conclusion_requirements:
        - viable_baseline_assessment
        - key_weaknesses_identified
        - next_test_recommendations
        - ml_readiness_assessment
