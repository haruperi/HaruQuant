name: kill_switch
version: 0.1.0
pattern: sequential
description: >
  Kill-switch lifecycle: armed → soft/hard triggered → recovery pending →
  recovery approved → re-armed. Prevents uncontrolled trading during
  critical failures.

steps:
  - name: arm_kill_switch
    agent: risk_governor_agent
    expected_output: TradeProposal
    validate: true
    input:
      workflow_step: 1
      stage: arm_kill_switch
      triggers:
        max_drawdown_pct: 10.0
        max_daily_loss: 5000.0
        max_consecutive_losses: 5
        system_health_threshold: critical

  - name: detect_trigger
    agent: monitoring_agent
    expected_output: ObservationEvent
    validate: true
    depends_on:
      - arm_kill_switch
    input:
      workflow_step: 2
      stage: detect_trigger
      trigger_type:
        - soft_threshold
        - hard_threshold
      soft_actions:
        - reduce_position_size
        - tighten_stops
        - alert_operator
      hard_actions:
        - halt_all_trading
        - close_open_positions
        - revoke_strategy_permissions

  - name: execute_containment
    agent: execution_agent
    expected_output: ExecutionReceipt
    validate: true
    depends_on:
      - detect_trigger
    input:
      workflow_step: 3
      stage: execute_containment
      containment_steps:
        - cancel_pending_orders
        - reduce_exposure_by_pct: 50
        - notify_all_strategies

  - name: request_recovery
    agent: risk_governor_agent
    expected_output: TradeProposal
    validate: true
    depends_on:
      - execute_containment
    input:
      workflow_step: 4
      stage: request_recovery
      recovery_requirements:
        - operator_approval: true
        - risk_assessment: complete
        - system_health_check: pass
        - cool_down_minutes: 30

  - name: approve_recovery
    agent: compliance_agent
    expected_output: EvaluationReport
    validate: true
    depends_on:
      - request_recovery
    input:
      workflow_step: 5
      stage: approve_recovery
      approval_criteria:
        - root_cause_identified: true
        - corrective_action_taken: true
        - operator_signoff: true
        - risk_governor_clearance: true

  - name: rearm_kill_switch
    agent: risk_governor_agent
    expected_output: TradeProposal
    validate: true
    depends_on:
      - approve_recovery
    input:
      workflow_step: 6
      stage: rearm_kill_switch
      post_recovery_controls:
        - reduced_position_limits: true
        - enhanced_monitoring: true
        - review_period_hours: 24
