# Agent Promotion Criteria
# Agents must pass ALL tiers before promotion to production

tier_1_unit:
  description: "All unit tests must pass"
  requirement: "100% unit test pass rate"
  tests:
    - "tests/unit/backend_retiring/agents/test_*.py"
  threshold: "all must pass"

tier_2_integration:
  description: "Integration tests must pass"
  requirement: "All workflow integration tests pass"
  tests:
    - "tests/integration/backend_retiring/agents/test_workflow_integration.py"
  threshold: "all must pass"

tier_3_golden:
  description: "Golden eval cases must pass"
  requirement: "All golden input/output pairs match"
  tests:
    - "tests/eval/golden_tasks/"
  threshold: "≥90% pass rate"

tier_4_adversarial:
  description: "Adversarial tests must not break agent"
  requirement: "Agent handles injection, edge cases, schema violations"
  tests:
    - "tests/eval/adversarial_tasks/"
  threshold: "≥80% graceful handling"

tier_5_latency:
  description: "Latency benchmarks within thresholds"
  requirement: "p50 < 3s, p95 < 10s for LLM-backed agents"
  tests:
    - "tests/eval/benchmarks/test_latency.py"
  threshold: "p95 < 10s"

tier_6_cost:
  description: "Cost tracking accurate"
  requirement: "Cost per run within expected range for model"
  tests:
    - "tests/eval/benchmarks/test_cost.py"
  threshold: "all must pass"

promotion_gate:
  all_tiers_required: true
  manual_review_required: true
  rollback_on_regression: true
