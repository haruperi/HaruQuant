metadata_schema_version: "1.0"
domain: risk analytics (VaR, CVaR, correlation, regime detection)
owner: risk_team
side_effect_risk: A
allowed_callers:
  - risk_engine
  - live_trading_engine
  - research_service
  - simulation_engine
credentials: []
audit_requirements: all risk assessments logged with portfolio state
failure_modes:
  - insufficient_data → return conservative estimate with uncertainty flag
  - computation_error → fallback to last known good value
rate_limits:
  assessments: 120/minute
timeout_budget:
  var_calc: 5s
  regime_detect: 10s
escalation_owner: risk_oncall
contract_version: 1.0.0
deprecation_notes: null
