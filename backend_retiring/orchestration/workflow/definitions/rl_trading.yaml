name: rl_trading
version: 0.1.0
pattern: sequential
description: >
  Train, evaluate, and report a reinforcement-learning trading model in
  research mode without live side effects.
steps:
  - name: define_state_action_reward
    agent: strategy_agent
    expected_output: WorkflowPlan
    validate: true
    input:
      stage: define_state_action_reward
      mode: research

  - name: train_rl_policy
    agent: strategy_agent
    expected_output: EvaluationReport
    validate: true
    depends_on:
      - define_state_action_reward
    input:
      stage: train_rl_policy
      side_effects_allowed: false

  - name: evaluate_oos_policy
    agent: risk_governor_agent
    expected_output: EvaluationReport
    validate: true
    depends_on:
      - train_rl_policy
    input:
      stage: evaluate_oos_policy

  - name: build_strategy_card
    agent: monitoring_agent
    expected_output: EvaluationReport
    validate: true
    depends_on:
      - evaluate_oos_policy
    input:
      stage: build_strategy_card

  - name: assemble_evidence
    agent: monitoring_agent
    expected_output: ReplayBundle
    validate: true
    depends_on:
      - build_strategy_card
    input:
      stage: assemble_evidence
